<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PB OPS — 통합 일정</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0a0a; --panel:#121212; --line:#262626; --line2:#1a1a1a;
    --ink:#f5f5f5; --mut:#8a8a8a; --mut2:#5c5c5c; --red:#F40606; --pur:#A575F0; --blu:#4DA6FF;
    --ph-plan:#3a3a3a; --ph-sample:#E8C547; --ph-deposit:#F40606; --ph-prod:#5BB97A; --ph-stock:#E08A2B; --ph-etc:#7C7C7C;
    --mono:'Space Mono',monospace;
    --ch-0:#E24B4A; --ch-1:#378ADD; --ch-2:#639922; --ch-3:#BA7517; --ch-4:#A575F0; --ch-5:#D4537E;
    --ch-6:#1D9E75; --ch-7:#D85A30; --ch-8:#5DCAA5; --ch-9:#888780; --ch-10:#85B7EB; --ch-11:#EF9F27;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Pretendard',sans-serif;-webkit-font-smoothing:antialiased;padding:0 0 80px}
  .wrap{max-width:1640px;margin:0 auto;padding:0 28px}

  header{padding:22px 0 14px}
  .hbar{display:flex;justify-content:space-between;align-items:center;gap:16px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--red);text-transform:uppercase}
  .hmeta{display:flex;align-items:center;gap:16px}
  .today{font-family:var(--mono);font-size:12px;color:var(--mut)}
  .today b{color:var(--ink)}
  .quote{font-size:12px;color:var(--mut);font-style:italic;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .quotewrap{display:inline-flex;align-items:center;gap:6px}
  .qedit{background:none;border:1px solid var(--line);color:var(--mut2);border-radius:5px;width:20px;height:20px;font-size:11px;cursor:pointer;line-height:1;flex:none}
  .qedit:hover{color:var(--ink);border-color:var(--mut)}
  .quote-input{background:#0a0a0a;border:1px solid var(--red);color:var(--ink);font-size:12px;font-style:italic;padding:3px 8px;border-radius:5px;width:220px;font-family:inherit}
  .quote-input:focus{outline:none}
  .qsave{background:var(--red);color:#fff;border:none;border-radius:5px;padding:0 9px;font-size:11px;font-weight:700;cursor:pointer;height:24px}
  .qmsg{font-family:var(--mono);font-size:10px;color:var(--mut2)}
  .hmain{display:flex;justify-content:space-between;align-items:flex-start;gap:28px;margin-top:14px;flex-wrap:wrap}
  .hleft{flex:1;min-width:260px}
  h1{font-size:clamp(28px,4vw,46px);font-weight:800;line-height:1;letter-spacing:-.02em}
  h1 .slash{color:var(--mut2);font-weight:400}
  .sub{display:flex;flex-wrap:wrap;gap:18px;margin-top:12px;font-family:var(--mono);font-size:12px;color:var(--mut)}
  .sub b{color:var(--ink)}
  .live{display:inline-flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ph-prod);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(91,185,122,.5)}70%{box-shadow:0 0 0 6px rgba(91,185,122,0)}100%{box-shadow:0 0 0 0 rgba(91,185,122,0)}}

  /* ADMIN */
  .adminbox{position:relative;display:inline-block}
  .adminbtn{font-family:var(--mono);font-size:10px;color:var(--mut2);background:none;border:1px solid var(--line);border-radius:99px;padding:5px 12px;cursor:pointer}
  .adminbtn:hover{color:var(--mut);border-color:var(--mut)}
  .adminbtn.in{color:var(--ph-prod);border-color:rgba(91,185,122,.4)}
  .adminpop{position:absolute;right:0;top:32px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;display:none;z-index:60;width:210px;text-align:left}
  .adminpop.open{display:block}
  .adminpop input{width:100%;background:#0a0a0a;border:1px solid var(--line);color:#fff;font-family:var(--mono);font-size:13px;padding:9px 11px;border-radius:6px;margin-bottom:8px}
  .adminpop input:focus{outline:none;border-color:var(--red)}
  .adminpop .lb{width:100%;background:var(--red);color:#fff;border:none;padding:9px;border-radius:6px;font-weight:700;cursor:pointer}
  .adminpop .err{color:var(--red);font-family:var(--mono);font-size:11px;height:13px;margin-top:6px}
  .adminpop .hint{font-family:var(--mono);font-size:10px;color:var(--mut2);margin-top:6px}

  .nav{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;gap:16px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);background:var(--bg);flex-wrap:wrap}
  .navtabs,.navutil{display:flex;gap:6px;overflow-x:auto}
  .tab{flex:none;background:transparent;border:1px solid var(--line);color:var(--mut);font-family:var(--mono);font-size:12px;padding:8px 14px;border-radius:99px;cursor:pointer;white-space:nowrap}
  .tab:hover{border-color:var(--mut)}
  .tab.on{background:var(--ink);color:#0a0a0a;border-color:var(--ink);font-weight:700}
  .tab.util.on{background:var(--red);color:#fff;border-color:var(--red)}

  .sec{margin-top:34px}
  .sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px}
  .sec-num{font-family:var(--mono);font-size:12px;color:var(--red)}
  .sec-title{font-size:20px;font-weight:700;letter-spacing:-.01em}
  .sec-src{font-family:var(--mono);font-size:11px;color:var(--mut2);margin-left:auto}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:18px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
  .card .brand{font-weight:800;font-size:17px;margin-bottom:4px}
  .card .chan{font-weight:700;font-size:13px;color:var(--ink)}
  .card .row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:18px}
  .card .date{font-family:var(--mono);font-size:13px;color:var(--ph-stock)}
  .card .figs{display:flex;gap:14px;font-family:var(--mono)}
  .card .fig{text-align:right}
  .card .fig b{display:block;font-size:13px;color:var(--ink);font-weight:700}
  .card .fig span{font-size:10px;color:var(--mut2)}

  /* 커머스 일정: 목록/캘린더 뷰 토글 */
  .viewtoggle{display:flex;gap:6px;margin-left:auto}
  .vt-btn{font-family:var(--mono);font-size:11px;color:var(--mut);background:transparent;border:1px solid var(--line);padding:5px 12px;border-radius:99px;cursor:pointer}
  .vt-btn.on{background:var(--ink);color:#0a0a0a;border-color:var(--ink);font-weight:700}
  .vt-btn:hover{border-color:var(--mut)}

  /* 목록 뷰 */
  .clist{border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .crow{display:grid;grid-template-columns:14px 1.6fr 1fr 190px 190px;gap:14px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line2)}
  .crow:last-child{border-bottom:none}
  .crow:hover{background:#181818}
  .crow .cdot{width:9px;height:9px;border-radius:2px;flex:none}
  .crow .cbrand{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crow .cchan{font-family:var(--mono);font-size:12px;color:#d8d8d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crow .cdate{font-family:var(--mono);font-size:12px;color:var(--ph-stock);text-align:right;white-space:nowrap}
  .crow .cfigs{display:flex;justify-content:flex-end;gap:14px;font-family:var(--mono);font-size:12px;text-align:right;white-space:nowrap}
  .crow .cfigs>span{width:84px}
  .crow .cfigs b{color:var(--ink);font-weight:700;display:block}
  .crow .cfigs span span{color:var(--mut2);font-size:10px;display:block}

  /* 월간 캘린더 뷰 — 주 단위로 일정이 가로 막대로 이어짐 */
  .calhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .calnav{display:flex;align-items:center;gap:14px}
  .calnav button{background:var(--panel);border:1px solid var(--line);color:var(--ink);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px}
  .calnav button:hover{border-color:var(--mut)}
  .calmonth{font-weight:700;font-size:16px;min-width:90px;text-align:center}
  .cal{border:1px solid var(--line);border-radius:6px;overflow:hidden;background:#161616}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:#1c1c1c;border-bottom:1px solid var(--line)}
  .cal-dow span{padding:9px 0;text-align:center;font-family:var(--mono);font-size:11px;color:var(--mut);font-weight:700}
  .cal-week{position:relative;border-bottom:1px solid var(--line2)}
  .cal-week:last-child{border-bottom:none}
  .cal-daynums{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-daynums .dn{border-right:1px solid var(--line2);padding:7px 8px 2px;min-height:26px}
  .cal-daynums .dn:last-child{border-right:none}
  .cal-daynums .dn span{font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:700}
  .cal-daynums .dn.out span{color:var(--mut2);font-weight:400}
  .cal-daynums .dn.today span{color:#fff;background:var(--red);padding:1px 7px;border-radius:99px}
  .cal-week-bg{position:absolute;inset:26px 0 0 0;display:grid;grid-template-columns:repeat(7,1fr);pointer-events:none}
  .cal-week-bg .wb{border-right:1px solid var(--line2)}
  .cal-week-bg .wb:last-child{border-right:none}
  .cal-week-bg .wb.out{background:rgba(255,255,255,.015)}
  .cal-week-bg .wb.today{background:rgba(244,6,6,.07)}
  .cal-lanes{position:relative;padding:2px 0 6px;min-height:20px}
  .cal-bar{position:absolute;height:19px;border-radius:4px;font-size:11px;font-weight:700;display:flex;align-items:center;padding:0 8px;overflow:hidden;white-space:nowrap;cursor:pointer;gap:5px}
  .cal-bar .bn{overflow:hidden;text-overflow:ellipsis}
  .cal-bar .bc{opacity:.8;font-weight:400;flex:none}
  .cal-more{position:absolute;font-family:var(--mono);font-size:9px;color:var(--mut);padding:1px 6px}
  .cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;font-size:11px;color:var(--mut)}
  .cal-legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}

  .legend{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:14px;font-size:12px;color:var(--mut)}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:6px;vertical-align:-1px}
  .gantt{background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:auto;max-height:72vh}
  .gantt-inner{min-width:1640px}
  .grid-head{display:grid;grid-template-columns:280px 1fr;position:sticky;top:0;z-index:3;background:var(--panel)}
  .gh-label{padding:12px 16px;font-family:var(--mono);font-size:11px;color:var(--mut2);border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
  .months{display:grid;grid-template-columns:repeat(24,1fr);border-bottom:1px solid var(--line)}
  .month{text-align:center;font-weight:700;font-size:12px;padding:8px 0 2px;border-right:1px solid var(--line2)}
  .month.q{color:var(--mut)}
  .weeks{display:grid;grid-template-columns:repeat(24,1fr);border-bottom:1px solid var(--line)}
  .week{text-align:center;font-family:var(--mono);font-size:9px;color:var(--mut2);padding:3px 0}
  .week:nth-child(4n){border-right:1px solid var(--line2)}
  .week.nowcol{background:rgba(244,6,6,.12);color:var(--red)}
  .grow{display:grid;grid-template-columns:280px 1fr;border-bottom:1px solid var(--line2);cursor:pointer;transition:background .12s}
  .grow:hover{background:#181818}
  .glabel{padding:9px 16px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:2px;min-width:0}
  .glabel .gb{display:flex;align-items:center;gap:7px}
  .glabel .gbrand{font-family:var(--mono);font-size:9px;letter-spacing:.05em;color:var(--mut);text-transform:uppercase}
  .glabel .gcat{font-size:9px;color:var(--mut2);border:1px solid var(--line);border-radius:2px;padding:0 5px;line-height:14px}
  .gstatus{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:2px;margin-left:auto;flex:none}
  .gstatus.now{background:rgba(91,185,122,.18);color:#7fd49b}
  .gstatus.soon{background:#1f1f1f;color:var(--mut)}
  .gstatus.done{background:rgba(224,138,43,.18);color:#e0a25b}
  .glabel .gitem{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .glabel .gsku{font-family:var(--mono);font-size:9px;color:var(--mut2)}
  .glabel .glink{color:var(--red)}
  .track{position:relative;display:grid;grid-template-columns:repeat(24,1fr);align-items:center;min-height:40px}
  .track .cell{border-right:1px solid var(--line2);height:100%}
  .track .cell:nth-child(4n){border-right:1px solid #222}
  .track .cell.nowcol{background:rgba(244,6,6,.06)}
  .bars{position:absolute;inset:0;display:grid;grid-template-columns:repeat(24,1fr);align-items:center}
  .bar{height:17px;border-radius:3px;font-family:var(--mono);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap;margin:0 1px}
  .bar.plan{background:var(--ph-plan);color:#b5b5b5}.bar.sample{background:var(--ph-sample);color:#0a0a0a}.bar.deposit{background:var(--ph-deposit);color:#fff}.bar.prod{background:var(--ph-prod);color:#0a0a0a}.bar.stock{background:var(--ph-stock);color:#fff}.bar.etc{background:var(--ph-etc);color:#fff}
  .toggle{background:#0d0d0d;border:none;border-bottom:1px solid var(--line2);color:var(--mut);font-family:var(--mono);font-size:11px;padding:11px 16px;cursor:pointer;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center}
  .toggle:hover{color:var(--ink)}
  .toggle .arw{transition:transform .15s;display:inline-block}
  .toggle.open .arw{transform:rotate(90deg)}
  .collapsed{display:none}

  .tasklist{border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .task{display:grid;grid-template-columns:1.1fr 1.5fr auto;gap:16px;align-items:center;padding:13px 18px;border-bottom:1px solid var(--line2);cursor:pointer}
  .task:last-child{border-bottom:none}.task:hover{background:#181818}
  .task .tb{font-family:var(--mono);font-size:10px;color:var(--mut);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .task .ti{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .task .tt{display:flex;align-items:center;gap:10px;min-width:0}
  .task .tt .t2{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 9px;border-radius:3px;white-space:nowrap;flex:none}
  .task .tr{text-align:right;display:flex;flex-direction:column;gap:2px}
  .task .td{font-family:var(--mono);font-size:13px;font-weight:700}
  .task .td.over{color:var(--red)}.task .td.soon{color:var(--ph-stock)}.task .td.ok{color:var(--mut)}
  .task .td.dday{color:var(--red);font-size:14px}
  .task .td.past{color:var(--mut2)}
  .task.muted{opacity:.45}
  .task.muted:hover{opacity:.75}
  .pastdiv{font-family:var(--mono);font-size:10px;color:var(--mut2);text-transform:uppercase;letter-spacing:.1em;padding:10px 18px 6px;border-top:1px solid var(--line2)}
  .task .tw{font-family:var(--mono);font-size:11px;color:var(--mut2)}
  .empty{font-family:var(--mono);font-size:12px;color:var(--mut2);padding:40px;text-align:center;border:1px dashed var(--line);border-radius:6px}
  .note{font-family:var(--mono);font-size:11px;color:var(--mut2);margin-top:10px}
  .totbar{display:flex;gap:28px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:18px 22px;margin-bottom:16px}
  .totbar .ti2{font-family:var(--mono);font-size:11px;color:var(--mut);text-transform:uppercase}
  .totbar .tv{font-size:22px;font-weight:800;margin-top:4px}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:.2s;z-index:50}
  .scrim.open{opacity:1;pointer-events:auto}
  .detail{position:fixed;top:0;right:0;bottom:0;width:min(470px,92vw);background:#0e0e0e;border-left:1px solid var(--line);transform:translateX(100%);transition:.24s cubic-bezier(.4,0,.2,1);z-index:51;overflow-y:auto;padding:30px 28px 50px}
  .detail.open{transform:translateX(0)}
  .detail .close{position:absolute;top:22px;right:24px;background:none;border:none;color:var(--mut);font-size:24px;cursor:pointer;line-height:1}
  .d-brand{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--mut);text-transform:uppercase}
  .d-item{font-size:24px;font-weight:800;margin:6px 0 4px;line-height:1.15}
  .d-meta{font-family:var(--mono);font-size:12px;color:var(--mut2);margin-bottom:8px}
  .d-h{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--red);text-transform:uppercase;margin:24px 0 12px}
  .phase{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line2)}
  .phase.cur{background:rgba(244,6,6,.06);margin:0 -10px;padding:10px;border-radius:4px}
  .phase .pdot{width:10px;height:10px;border-radius:2px;flex:none}
  .phase .pname{font-weight:600;font-size:14px;flex:1}
  .phase .pwhen{font-family:var(--mono);font-size:12px;color:var(--mut)}
  .ck{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line2)}
  .ck .cs{width:16px;height:16px;border-radius:4px;flex:none;display:flex;align-items:center;justify-content:center;font-size:10px}
  .ck .cs.done{background:var(--ph-prod);color:#0a0a0a}.ck .cs.now{background:var(--red);color:#fff}.ck .cs.soon{border:1px solid var(--line);color:var(--mut2)}
  .ck .cn{flex:1;font-size:13px}
  .ck .cn small{display:block;color:var(--mut2);font-family:var(--mono);font-size:10px}
  .ck .ct{font-family:var(--mono);font-size:9px;border:1px solid;border-radius:2px;padding:0 5px}
  .ck .cw{font-family:var(--mono);font-size:11px;color:var(--mut)}
  .sale{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--red);border-radius:4px;padding:16px;margin-top:6px}
  .sale .sb{font-weight:700;font-size:15px}.sale .sm{font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:3px}
  .sale .sr{display:flex;justify-content:space-between;margin-top:12px;font-family:var(--mono);font-size:13px}.sale .sr .v{color:var(--ph-stock)}
  .nolink{font-family:var(--mono);font-size:12px;color:var(--mut2);padding:10px 0}
  footer{margin-top:50px;padding-top:22px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--mut2);line-height:1.7}
  footer b{color:var(--mut)}
  @media(max-width:760px){.task{grid-template-columns:1fr auto}.task .tt{grid-column:1/-1;order:3}.crow{grid-template-columns:14px 1fr auto;grid-template-areas:"dot brand date" "dot chan figs";row-gap:4px}.crow .cdot{grid-area:dot}.crow .cbrand{grid-area:brand}.crow .cdate{grid-area:date}.crow .cchan{grid-area:chan}.crow .cfigs{grid-area:figs}.cal-cell{min-height:64px}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <header>
    <div class="hbar">
      <div class="eyebrow">Glow Up Rizz · Commerce Ops</div>
      <div class="hmeta">
        <span class="today">TODAY <b id="today"></b></span>
        <span class="quotewrap"><span class="quote" id="quote"></span><button class="qedit" id="qedit" title="문구 수정" style="display:none">✎</button></span>
        <div class="adminbox" id="adminbox">
          <button class="adminbtn" id="adminbtn">관리자 로그인</button>
          <div class="adminpop" id="adminpop">
            <input id="pw" type="password" placeholder="비밀번호" autocomplete="off" />
            <button class="lb" id="login">입장</button>
            <div class="err" id="err"></div>
          </div>
        </div>
      </div>

 {d:0,t:"모니터링 시작",team:"MD"},
];
const DEFAULT_QUOTE="오늘 하루도 단단하게 ✊"; // API 연결 실패 시 폴백 문구
let currentQuote=DEFAULT_QUOTE;

let commerce=DEMO_COMMERCE, production=DEMO_PRODUCTION, activeTab="전체", commerceViewMode="list";
const TODAY=new Date(), START=new Date(2026,5,29);
const TODAY_MID=new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
const curSlot=Math.floor((TODAY-START)/(7*864e5))+1;
const won=n=>Number(n||0).toLocaleString('ko-KR');
const norm=s=>(s||'').replace(/\[PB\]|\s/g,'');
function weekLabel(s){
  const d=slotToDate(s);
  const y=d.getFullYear(),mo=d.getMonth()+1;
  // 해당 월의 1일이 속한 주를 1주차로 보고, slotToDate(s)가 몇 번째 주인지 계산
  const firstOfMonth=new Date(y,mo-1,1);
  const wk=Math.ceil((d.getDate()+firstOfMonth.getDay())/7)||1;
  const yLabel=y===2026?'':((y-2000)+'년 ');
  return yLabel+mo+'월 '+wk+'주';
}
function startSlot(p){return Math.min.apply(null,p.ph.map(x=>x[1]));}
function stockSlot(p){let m=0;p.ph.forEach(([t,s,e])=>{if(t==='stock')m=Math.max(m,e);});if(!m)m=Math.max.apply(null,p.ph.map(x=>x[2]));return m;}
function statusOf(p){const st=stockSlot(p);if(st<curSlot)return 'done';if(startSlot(p)<=curSlot)return 'now';return 'soon';}
const STAT={now:{t:"진행중",c:"now"},soon:{t:"예정",c:"soon"},done:{t:"입고완료",c:"done"}};
function matchPC(p,c){const item=norm(p.item),b=norm(c.brand);for(let i=0;i<item.length-1;i++){if(b.includes(item.substr(i,2)))return true;}return false;}
function findSale(p){return commerce.find(c=>matchPC(p,c));}
// 판매일정 텍스트의 시작일을 파싱. Monday 날짜 범위는 "2026-06-01 - 2026-06-10" 형식(ISO),
// 수기로 입력된 경우 "6월 1 - 30" 같은 한글 형식일 수도 있어 둘 다 지원한다.
function cdate(s){
  s=(s||'').trim();
  const iso=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(iso)return new Date(+iso[1],+iso[2]-1,+iso[3]);
  const m=s.match(/(\d+)월\s*(\d+)/);
  return m?new Date(2026,+m[1]-1,+m[2]):new Date(2100,0,1);
}
// 판매일정 텍스트에서 종료일을 파싱. ISO 범위("2026-06-01 - 2026-06-10")는 두 번째 날짜를,
// "6월 23-7월 5" 같은 한글 범위는 두 번째(월,일)를, "6월 25-30"처럼 일자만 반복되면 같은 달의
// 두 번째 일자를, 단일 날짜면 그 날짜를 종료일로 본다.
function cdateEnd(s){
  s=(s||'').trim();
  const isos=[...s.matchAll(/(\d{4})-(\d{1,2})-(\d{1,2})/g)];
  if(isos.length){const last=isos[isos.length-1];return new Date(+last[1],+last[2]-1,+last[3]);}
  const ms=[...s.matchAll(/(\d+)월\s*(\d+)/g)];
  if(ms.length>=2){const last=ms[ms.length-1];return new Date(2026,+last[1]-1,+last[2]);}
  if(ms.length===1){
    const m=ms[0],after=s.slice(m.index+m[0].length);
    const range=after.match(/^\s*-\s*(\d+)/);
    if(range)return new Date(2026,+m[1]-1,+range[1]);
    return new Date(2026,+m[1]-1,+m[2]);
  }
  return new Date(2100,0,1);
}
function slotToDate(s){return new Date(START.getTime()+(s-1)*7*864e5);}
function daysLeft(d){return Math.round((d-TODAY)/864e5);}
function fmtD(d){return (d.getMonth()+1)+"/"+d.getDate();}
function ddLabel(dl){return dl<0?(-dl)+"일 지남":dl===0?"오늘":"D-"+dl;}
function ddCls(dl){return dl<0?"over":dl<=3?"soon":"ok";}
// 자금 일정 전용: 지난 건은 "N일 지남" 대신 날짜만, D-day 당일은 강조
function moneyLabel(dl){return dl<0?"지남":dl===0?"D-DAY":"D-"+dl;}
function moneyCls(dl){return dl<0?"past":dl===0?"dday":dl<=3?"soon":"ok";}
function anchorDate(p){const s=findSale(p);return s?cdate(s.date):slotToDate(stockSlot(p));}

/* 간트 — 오늘이 속한 주(curSlot)가 항상 캘린더의 맨 왼쪽 첫 칸이 되도록 슬라이딩 */
const GANTT_WEEKS=24; // 화면에 보이는 주 수
function dispSlot(realSlot){return realSlot-curSlot+1;} // curSlot -> 1
function ganttHead(){
  // 표시되는 24주 각각의 실제 날짜를 구해 월별로 그룹핑
  const weekDates=[];for(let d=1;d<=GANTT_WEEKS;d++)weekDates.push(slotToDate(curSlot+d-1));
  const monthGroups=[];
  weekDates.forEach((dt,idx)=>{
    const y=dt.getFullYear(),mo=dt.getMonth();
    const last=monthGroups[monthGroups.length-1];
    if(last&&last.y===y&&last.mo===mo)last.span++;
    else monthGroups.push({y,mo,span:1});
  });
  let mh=monthGroups.map((g,i)=>{const label=(g.y===2026?'':((g.y-2000)+'년 '))+(g.mo+1)+'월';return '<div class="month'+(i%2===1?' q':'')+'" style="grid-column:span '+g.span+'">'+label+'</div>';}).join('');
  let wk='';
  weekDates.forEach((dt,idx)=>{
    const s=curSlot+idx;
    const firstOfMonth=new Date(dt.getFullYear(),dt.getMonth(),1);
    const w=Math.ceil((dt.getDate()+firstOfMonth.getDay())/7)||1;
    wk+='<div class="week'+(idx===0?' nowcol':'')+'">'+w+'주</div>';
  });
  return '<div class="grid-head"><div class="gh-label">BRAND / 품목 / SKU</div><div><div class="months" style="grid-template-columns:repeat('+GANTT_WEEKS+',1fr)">'+mh+'</div><div class="weeks" style="grid-template-columns:repeat('+GANTT_WEEKS+',1fr)">'+wk+'</div></div></div>';
}
function rowHTML(p,idx){
  let cells='';for(let i=1;i<=GANTT_WEEKS;i++)cells+='<div class="cell'+(i===1?' nowcol':'')+'"></div>';
  let bars='';
  p.ph.forEach(([t,s,e])=>{
    const ds=dispSlot(s),de=dispSlot(e);
    if(de<1||ds>GANTT_WEEKS)return; // 화면 밖이면 그리지 않음
    const cs=Math.max(ds,1),ce=Math.min(de,GANTT_WEEKS);
    bars+='<div class="bar '+t+'" style="grid-column:'+cs+' / '+(ce+1)+'">'+PHASE[t].s+'</div>';
  });
  const st=statusOf(p),sale=findSale(p);
  return '<div class="grow" data-i="'+idx+'" style="--gw:'+GANTT_WEEKS+'"><div class="glabel"><div class="gb"><span class="gbrand">'+p.brand+'</span><span class="gcat">'+p.cat+'</span><span class="gstatus '+STAT[st].c+'">'+STAT[st].t+'</span></div><span class="gitem" title="'+p.item+'">'+p.item+'</span><span class="gsku">SKU '+p.sku+(sale?' · <span class="glink">판매연동</span>':'')+'</span></div><div class="track" style="grid-template-columns:repeat('+GANTT_WEEKS+',1fr)">'+cells+'<div class="bars" style="grid-template-columns:repeat('+GANTT_WEEKS+',1fr)">'+bars+'</div></div></div>';
}
function ganttBlock(list){
  const active=list.filter(x=>statusOf(x.p)!=='done'),done=list.filter(x=>statusOf(x.p)==='done');
  active.sort((a,b)=>(statusOf(a.p)==='now'?0:1)-(statusOf(b.p)==='now'?0:1)||startSlot(a.p)-startSlot(b.p));
  let html='<div class="gantt"><div class="gantt-inner">'+ganttHead()+active.map(x=>rowHTML(x.p,x.i)).join('');
  if(done.length)html+='<button class="toggle" data-toggle="done-group"><span><span class="arw">▸</span> 입고 완료 '+done.length+'건</span><span>펼치기</span></button><div class="collapsed" id="done-group">'+done.map(x=>rowHTML(x.p,x.i)).join('')+'</div>';
  return html+'</div></div>';
}
function cardsHTML(list){return '<div class="cards">'+list.map(c=>'<div class="card"><div class="brand">'+c.brand+'</div><div class="chan">'+c.channel+'</div><div class="row"><span class="date">'+c.date+'</span><div class="figs"><div class="fig"><b>'+won(c.deal)+'</b><span>거래액</span></div><div class="fig"><b>'+won(c.actual)+'</b><span>실매출</span></div></div></div></div>').join('')+'</div>';}
function isClosed(c){return cdateEnd(c.date)<TODAY_MID;}

/* 채널/크리에이터명 → 색상 배정. 매 렌더마다 실제 등장하는 채널 목록을 모아
   순서대로 큰 팔레트에서 배정하므로(해시 충돌 없음) 비슷한 색이 겹치지 않는다. */
const CH_COLORS=['#E0524F','#4A90D9','#7BAE3E','#E0A23A','#9B6FE0','#D9477B','#3FB89A','#D9824A','#5AA8E0','#C45FD0','#4EBF8A','#E0507B','#7B7FE0','#3FA0C9','#E08A3A','#6FA83E','#D94AA0','#3FC2C2','#A8773E','#8A8FE0'];
let _chanColorMap=null;
function rebuildChanColorMap(){
  const names=[...new Set(commerce.map(c=>(c.channel||'').trim()).filter(Boolean))];
  _chanColorMap=new Map();
  names.forEach((n,i)=>_chanColorMap.set(n,CH_COLORS[i%CH_COLORS.length]));
}
function chanColor(name){
  if(!_chanColorMap)rebuildChanColorMap();
  const s=(name||'').trim();
  if(!s)return '#7c7c7c';
  if(!_chanColorMap.has(s)){ // 목록 갱신 후 새 채널이 추가된 경우 대비
    rebuildChanColorMap();
  }
  return _chanColorMap.get(s)||'#7c7c7c';
}

/* 목록 뷰: 날짜순 한 줄 리스트 */
function listHTML(list){
  if(!list.length)return '<div class="empty">진행 중인 커머스 판매 일정 없음</div>';
  const rows=list.slice().sort((a,b)=>cdate(a.date)-cdate(b.date)).map(c=>{
    const col=chanColor(c.channel);
    return '<div class="crow"><span class="cdot" style="background:'+col+'"></span><span class="cbrand" title="'+c.brand+'">'+c.brand+'</span><span class="cchan">'+(c.channel||'-')+'</span><span class="cdate">'+c.date+'</span><span class="cfigs"><span><b>'+won(c.deal)+'</b><span>거래액</span></span><span><b>'+won(c.actual)+'</b><span>실매출</span></span></span></div>';
  }).join('');
  return '<div class="clist">'+rows+'</div>';
}

/* 캘린더 뷰: 월간 그리드, 일정이 주 단위로 가로 막대로 이어짐. 채널/크리에이터별 색상으로 겹침 직관 확인 */
let calCursor=null; // {y, m} - null이면 오늘이 속한 달로 초기화
function calendarHTML(list, brand){
  if(!calCursor)calCursor={y:TODAY.getFullYear(),m:TODAY.getMonth()};
  const {y,m}=calCursor;
  const first=new Date(y,m,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push({d:prevDays-startDow+1+i,out:true,y:m===0?y-1:y,m:m===0?11:m-1});
  for(let d=1;d<=daysInMonth;d++)cells.push({d,out:false,y,m});
  while(cells.length%7!==0||cells.length<35)cells.push({d:cells.length-startDow-daysInMonth+1,out:true,y:m===11?y+1:y,m:m===11?0:m+1});
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));

  const LANE_H=23,LANES_VISIBLE=3;
  const weeksHTML=weeks.map(week=>{
    const weekStart=new Date(week[0].y,week[0].m,week[0].d);
    const weekEnd=new Date(week[6].y,week[6].m,week[6].d);
    // 이 주와 겹치는 일정만 추려서, 시작 요일(0-6) ~ 끝 요일(0-6)으로 변환
    const segs=list.map(c=>{
      const s=cdate(c.date),e=cdateEnd(c.date);
      if(isNaN(s)||isNaN(e)||e<weekStart||s>weekEnd)return null;
      const segStart=s<weekStart?weekStart:s;
      const segEnd=e>weekEnd?weekEnd:e;
      const startCol=Math.round((segStart-weekStart)/864e5);
      const endCol=Math.round((segEnd-weekStart)/864e5);
      return {c,startCol,endCol,contStart:s<weekStart,contEnd:e>weekEnd};
    }).filter(Boolean).sort((a,b)=>a.startCol-b.startCol||(b.endCol-b.startCol)-(a.endCol-a.startCol));
    // 레인 배정: 겹치는 구간은 다른 레인에, 안 겹치면 같은 레인 재사용
    const laneEnds=[]; // laneEnds[i] = 그 레인에서 마지막으로 점유한 endCol
    segs.forEach(seg=>{
      let lane=laneEnds.findIndex(end=>end<seg.startCol);
      if(lane===-1){lane=laneEnds.length;laneEnds.push(seg.endCol);}
      else laneEnds[lane]=seg.endCol;
      seg.lane=lane;
    });
    const maxLane=laneEnds.length;
    const overflowLanes=Math.max(0,maxLane-LANES_VISIBLE);
    const visibleSegs=segs.filter(s=>s.lane<LANES_VISIBLE);
    const hiddenCountByCol=Array(7).fill(0);
    segs.filter(s=>s.lane>=LANES_VISIBLE).forEach(s=>{for(let i=s.startCol;i<=s.endCol;i++)hiddenCountByCol[i]++;});

    const dayNumsHTML=week.map(c=>{
      const isToday=!c.out&&c.y===TODAY.getFullYear()&&c.m===TODAY.getMonth()&&c.d===TODAY.getDate();
      return '<div class="dn'+(c.out?' out':'')+(isToday?' today':'')+'"><span>'+c.d+'</span></div>';
    }).join('');
    const bgHTML=week.map(c=>{
      const isToday=!c.out&&c.y===TODAY.getFullYear()&&c.m===TODAY.getMonth()&&c.d===TODAY.getDate();
      return '<div class="wb'+(c.out?' out':'')+(isToday?' today':'')+'"></div>';
    }).join('');
    const barsHTML=visibleSegs.map(seg=>{
      const col=chanColor(seg.c.channel);
      const left=(seg.startCol/7*100),width=((seg.endCol-seg.startCol+1)/7*100);
      const top=seg.lane*LANE_H;
      const radius='border-radius:'+(seg.contStart?'0':'4px')+' '+(seg.contEnd?'0':'4px')+' '+(seg.contEnd?'0':'4px')+' '+(seg.contStart?'0':'4px');
      return '<div class="cal-bar" style="left:'+left+'%;width:'+width+'%;top:'+top+'px;background:'+col+'26;color:'+col+';'+radius+'" title="'+seg.c.brand+' · '+(seg.c.channel||'')+' · '+seg.c.date+'"><span class="bn">'+seg.c.brand+'</span>'+(seg.c.channel?'<span class="bc">· '+seg.c.channel+'</span>':'')+'</div>';
    }).join('');
    let moreHTML='';
    if(overflowLanes>0){
      // 숨겨진 일정이 있는 가장 왼쪽 칸들에 "+N건" 표시
      let i=0;
      while(i<7){
        if(hiddenCountByCol[i]>0){
          let j=i;while(j<7&&hiddenCountByCol[j]===hiddenCountByCol[i])j++;
          const left=(i/7*100),width=((j-i)/7*100);
          moreHTML+='<div class="cal-more" style="left:'+left+'%;width:'+width+'%;top:'+(LANES_VISIBLE*LANE_H)+'px">+'+hiddenCountByCol[i]+'건</div>';
          i=j;
        }else i++;
      }
    }
    const laneCount=Math.min(maxLane,LANES_VISIBLE)+(overflowLanes>0?1:0);
    const lanesHeight=Math.max(laneCount*LANE_H,4);
    return '<div class="cal-week"><div class="cal-week-bg">'+bgHTML+'</div><div class="cal-daynums">'+dayNumsHTML+'</div><div class="cal-lanes" style="height:'+lanesHeight+'px">'+barsHTML+moreHTML+'</div></div>';
  }).join('');

  const chans=[...new Set(list.map(c=>c.channel).filter(Boolean))].slice(0,12);
  const legendHTML=chans.map(ch=>'<span><i style="background:'+chanColor(ch)+'"></i>'+ch+'</span>').join('');
  const navAttr=brand?(' data-brand="'+brand+'"'):'';
  return '<div class="calhead"><div class="calnav"'+navAttr+'><button class="cal-prev">‹</button><span class="calmonth">'+(m+1)+'월 '+y+'</span><button class="cal-next">›</button></div></div>'+
    '<div class="cal"><div class="cal-dow">'+dowHTML(['일','월','화','수','목','금','토'])+'</div>'+weeksHTML+'</div>'+
    (chans.length?'<div class="cal-legend">'+legendHTML+'</div>':'');
}
function dowHTML(dow){return dow.map(d=>'<span>'+d+'</span>').join('');}


function commerceCardsToggle(list, brand){
  const open=list.filter(c=>!isClosed(c));
  const mode=commerceViewMode;
  const body=!open.length?'<div class="empty">진행 중인 커머스 판매 일정 없음</div>':(mode==='cal'?calendarHTML(open,brand):listHTML(open));
  return '<div class="viewtoggle"><button class="vt-btn'+(mode==='list'?' on':'')+'" data-vt="list">목록</button><button class="vt-btn'+(mode==='cal'?' on':'')+'" data-vt="cal">캘린더</button></div>'+body;
}

function viewArrivals(){
  const rows=production.map((p,i)=>({p,i})).filter(x=>stockSlot(x.p)>=curSlot).sort((a,b)=>stockSlot(a.p)-stockSlot(b.p));
  if(!rows.length)return '<section class="sec"><div class="empty">예정된 입고 없음</div></section>';
  const body=rows.map(x=>{const ss=stockSlot(x.p),dl=daysLeft(slotToDate(ss));return '<div class="task" data-i="'+x.i+'"><div class="tl"><div class="tb">'+x.p.brand+' · '+x.p.cat+'</div><div class="ti">'+x.p.item+'</div></div><div class="tt"><span class="badge" style="background:var(--ph-stock);color:#fff">입고</span><span class="t2">'+weekLabel(ss)+'</span></div><div class="tr"><span class="td '+ddCls(dl)+'">'+ddLabel(dl)+'</span><span class="tw">'+fmtD(slotToDate(ss))+'</span></div></div>';}).join('');
  return '<section class="sec"><div class="sec-head"><span class="sec-num">★</span><span class="sec-title">입고 임박</span><span class="sec-src">가까운 순 · '+rows.length+'건</span></div><div class="tasklist">'+body+'</div></section>';
}
function viewMoney(){
  const evs=[];production.forEach((p,i)=>p.ph.forEach(([t,s,e,amount])=>{if(t==='deposit')evs.push({i,p,slot:s,due:slotToDate(s),amount:amount||0});}));
  if(!evs.length)return '<section class="sec"><div class="empty">선금 일정 없음</div></section>';
  const upcoming=evs.filter(e=>daysLeft(e.due)>=0).sort((a,b)=>a.slot-b.slot);
  const past=evs.filter(e=>daysLeft(e.due)<0).sort((a,b)=>b.slot-a.slot);
  const hasAmount=evs.some(e=>e.amount>0);
  const totUpcoming=upcoming.reduce((a,e)=>a+e.amount,0);
  const row=(e,isPast)=>{
    const dl=daysLeft(e.due);
    const amtTag=e.amount>0?' · <span style="color:var(--ink);font-weight:700">'+won(e.amount)+'원</span>':'';
    return '<div class="task'+(isPast?' muted':'')+'" data-i="'+e.i+'"><div class="tl"><div class="tb">'+e.p.brand+' · '+e.p.cat+'</div><div class="ti">'+e.p.item+'</div></div><div class="tt"><span class="badge" style="background:var(--red);color:#fff">선금</span><span class="t2">'+weekLabel(e.slot)+amtTag+'</span></div><div class="tr"><span class="td '+moneyCls(dl)+'">'+moneyLabel(dl)+'</span><span class="tw">'+fmtD(e.due)+'</span></div></div>';
  };
  let body=upcoming.map(e=>row(e,false)).join('');
  if(past.length)body+='<div class="pastdiv">지난 선금 '+past.length+'건</div>'+past.map(e=>row(e,true)).join('');
  const totBar=hasAmount?'<div class="totbar"><div><div class="ti2">예정 선금 건수</div><div class="tv">'+upcoming.length+'건</div></div><div><div class="ti2">예정 선금 합계</div><div class="tv">'+won(totUpcoming)+'원</div></div></div>':'';
  const note=hasAmount?'<div class="note">금액은 \'PB 자금 계획\' 시트의 선금/잔금 50 컬럼과 자동 연동</div>':'<div class="note">금액은 \'PB 자금 계획\' 시트에 품목별 선금액이 입력되면 자동 표시</div>';
  return '<section class="sec"><div class="sec-head"><span class="sec-num">★</span><span class="sec-title">자금 일정 (선금 지출)</span><span class="sec-src">시점 순 · '+upcoming.length+'건 예정</span></div>'+totBar+'<div class="tasklist">'+body+'</div>'+note+'</section>';
}
function monthKey(c){const d=cdate(c.date);return d.getFullYear()*12+d.getMonth();}
function monthName(c){const d=cdate(c.date);return d.getFullYear()===2026?(d.getMonth()+1)+'월':(d.getFullYear()-2000)+'년 '+(d.getMonth()+1)+'월';}
function viewSales(){
  if(!commerce.length)return '<section class="sec"><div class="empty">매출 일정 없음</div></section>';
  const curKey=TODAY.getFullYear()*12+TODAY.getMonth();
  const groups={};
  commerce.forEach(c=>{const k=monthKey(c);(groups[k]=groups[k]||{key:k,label:monthName(c),items:[]}).items.push(c);});
  const sorted=Object.values(groups).sort((a,b)=>a.key-b.key);
  const curGroup=groups[curKey];
  const curDeal=curGroup?curGroup.items.reduce((a,c)=>a+Number(c.deal||0),0):0;
  const curActual=curGroup?curGroup.items.reduce((a,c)=>a+Number(c.actual||0),0):0;
  let body='';
  sorted.forEach(g=>{
    g.items.sort((a,b)=>cdate(a.date)-cdate(b.date));
    const gid='salesmonth-'+g.key;
    if(g.key===curKey){
      body+='<div class="sec-head" style="margin:22px 0 10px"><span class="sec-title" style="font-size:15px">'+g.label+' · 이번 달</span><span class="sec-src">'+g.items.length+'건</span></div>'+listHTML(g.items);
    }else{
      const tag=g.key<curKey?'지난 달':'다음 달';
      body+='<button class="toggle" data-toggle="'+gid+'"><span><span class="arw">▸</span> '+g.label+' · '+g.items.length+'건 ('+tag+')</span><span>펼치기</span></button><div class="collapsed" id="'+gid+'">'+listHTML(g.items)+'</div>';
    }
  });
  const curLabel=curGroup?curGroup.label:monthName({date:TODAY.getFullYear()+'-'+(TODAY.getMonth()+1)+'-1'});
  return '<section class="sec"><div class="sec-head"><span class="sec-num">★</span><span class="sec-title">매출 현황</span><span class="sec-src">'+curLabel+' · Monday</span></div><div class="totbar"><div><div class="ti2">'+curLabel+' PB 판매 건수</div><div class="tv">'+(curGroup?curGroup.items.length:0)+'건</div></div><div><div class="ti2">거래액 합계</div><div class="tv">'+won(curDeal)+'원</div></div><div><div class="ti2">실매출 합계</div><div class="tv">'+won(curActual)+'원</div></div></div>'+body+'<div class="note">거래액·실매출은 Monday \'거래액\'·\'실매출\' 컬럼과 자동 연동 · 이번 달만 기본으로 펼쳐짐</div></section>';
}

/* 렌더 */
function brands(){return [...new Set(production.map(p=>p.brand))];}
const UTIL=["입고 임박","자금","매출"];
function renderNav(){
  document.getElementById('navtabs').innerHTML=['전체',...brands()].map(v=>'<button class="tab'+(activeTab===v?' on':'')+'" data-tab="'+v+'">'+v+'</button>').join('');
  document.getElementById('navutil').innerHTML=UTIL.map(v=>'<button class="tab util'+(activeTab===v?' on':'')+'" data-tab="'+v+'">'+v+'</button>').join('');
  document.querySelectorAll('.nav .tab').forEach(t=>t.onclick=()=>{activeTab=t.dataset.tab;calCursor=null;render();});
}
function renderView(){
  let v;
  if(activeTab==='입고 임박')v=viewArrivals();
  else if(activeTab==='자금')v=viewMoney();
  else if(activeTab==='매출')v=viewSales();
  else v=viewAll(activeTab==='전체'?null:activeTab);
  document.getElementById('view').innerHTML=v;
  document.getElementById('tabname').textContent=activeTab;
  document.querySelectorAll('.grow,.task').forEach(g=>g.onclick=()=>openDetail(+g.dataset.i));
  document.querySelectorAll('.toggle').forEach(b=>b.onclick=()=>{const g=document.getElementById(b.dataset.toggle);const open=g.classList.toggle('collapsed')===false;b.classList.toggle('open',open);b.querySelector('span:last-child').textContent=open?'접기':'펼치기';});
  document.querySelectorAll('.vt-btn').forEach(b=>b.onclick=()=>{commerceViewMode=b.dataset.vt;calCursor=null;renderView();});
  document.querySelectorAll('.cal-prev').forEach(b=>b.onclick=()=>{if(!calCursor)calCursor={y:TODAY.getFullYear(),m:TODAY.getMonth()};calCursor.m--;if(calCursor.m<0){calCursor.m=11;calCursor.y--;}renderView();});
  document.querySelectorAll('.cal-next').forEach(b=>b.onclick=()=>{if(!calCursor)calCursor={y:TODAY.getFullYear(),m:TODAY.getMonth()};calCursor.m++;if(calCursor.m>11){calCursor.m=0;calCursor.y++;}renderView();});
}
function render(){renderNav();renderView();}

function openDetail(i){
  const p=production[i],sale=findSale(p),st=statusOf(p),A=anchorDate(p);
  const phases=p.ph.map(([t,s,e])=>{const cur=(s<=curSlot&&curSlot<=e);return '<div class="phase'+(cur?' cur':'')+'"><span class="pdot" style="background:'+PHASE[t].c+'"></span><span class="pname">'+PHASE[t].ko+(cur?' ← 지금':'')+'</span><span class="pwhen">'+weekLabel(s)+(e>s?' → '+weekLabel(e):'')+'</span></div>';}).join('');
  const ckl=CHECK.map(c=>{const due=new Date(A.getTime()-c.d*864e5),dl=daysLeft(due),cls=dl<0?'done':dl<=3?'now':'soon',mark=dl<0?'✓':dl<=3?'!':'',tc=TEAMC[c.team];
    return '<div class="ck"><span class="cs '+cls+'">'+mark+'</span><span class="cn">'+c.t+(c.dep?'<small>↳ '+c.dep+'</small>':'')+'</span><span class="ct" style="border-color:'+tc.c+';color:'+tc.c+'">'+c.team+'</span><span class="cw">'+fmtD(due)+' '+ddLabel(dl)+'</span></div>';}).join('');
  const saleBlock=sale?'<div class="sale"><div class="sb">'+sale.brand+'</div><div class="sm">'+sale.channel+'</div><div class="sr"><span>'+sale.date+'</span><span class="v">목표 '+won(sale.revenue)+'</span></div></div>':'<div class="nolink">연동된 커머스 판매 일정 없음 (앵커=입고일 기준)</div>';
  document.getElementById('dbody').innerHTML='<div class="d-brand">'+p.brand+'</div><div class="d-item">'+p.item+'</div><div class="d-meta">'+p.cat+' · SKU '+p.sku+' · <b style="color:'+(st==='now'?'#7fd49b':st==='done'?'#e0a25b':'var(--mut)')+'">'+STAT[st].t+'</b></div><div class="d-h">생산 개발 일정</div>'+phases+'<div class="d-h">런칭 체크리스트 (AMD·MD·디자인)</div>'+ckl+'<div class="d-h">커머스 판매</div>'+saleBlock;
  document.getElementById('scrim').classList.add('open');document.getElementById('detail').classList.add('open');
}
function closeDetail(){document.getElementById('scrim').classList.remove('open');document.getElementById('detail').classList.remove('open');}
document.getElementById('dclose').onclick=closeDetail;document.getElementById('scrim').onclick=closeDetail;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});

document.getElementById('today').textContent=TODAY.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

function renderQuote(){document.getElementById('quote').textContent='“'+currentQuote+'”';}
renderQuote();
async function loadQuote(){
  try{const r=await fetch('/api/quote');if(r.ok){const j=await r.json();if(j&&j.quote){currentQuote=j.quote;renderQuote();}}}catch(e){}
}
loadQuote();

function meta(live){document.getElementById('srcmode').textContent=live?'LIVE':'DEMO';document.getElementById('m-commerce').textContent=commerce.length;document.getElementById('m-prod').textContent=production.length;document.getElementById('m-time').innerHTML='업데이트 <b>'+new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})+'</b>';}
async function load(){
  let live=false;
  try{const [c,p]=await Promise.all([fetch('/api/monday-pb').then(r=>r.ok?r.json():null),fetch('/api/sheet-pb').then(r=>r.ok?r.json():null)]);
    if(Array.isArray(c)&&c.length){commerce=c;live=true;_chanColorMap=null;}if(Array.isArray(p)&&p.length){production=p;live=true;}}catch(e){}
  meta(live);render();
}
load();setInterval(load,15*60*1000);

// 관리자 (우상단 코너 팝오버)
let isAdmin=false, adminPw='';
const adminbox=document.getElementById('adminbox'),adminbtn=document.getElementById('adminbtn'),adminpop=document.getElementById('adminpop'),quotewrap=document.querySelector('.quotewrap');
adminbtn.onclick=e=>{e.stopPropagation();if(isAdmin){isAdmin=false;adminPw='';adminbtn.textContent='관리자 로그인';adminbtn.classList.remove('in');bindQedit();return;}adminpop.classList.toggle('open');document.getElementById('pw').focus();};
function doLogin(){
  const pw=document.getElementById('pw').value;
  if(pw==='rizz2026'){isAdmin=true;adminPw=pw;adminpop.classList.remove('open');adminbtn.textContent='관리자 · 로그아웃';adminbtn.classList.add('in');document.getElementById('pw').value='';document.getElementById('err').textContent='';bindQedit();}
  else{document.getElementById('err').textContent='비밀번호 오류';}
}
document.getElementById('login').onclick=doLogin;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.addEventListener('click',e=>{if(!adminbox.contains(e.target))adminpop.classList.remove('open');});

// 문구 편집 (관리자만, 저장 시 'PB 자금 계획' 시트 셀에 기록 → 모두에게 동일하게 노출)
function bindQedit(){
  const btn=document.getElementById('qedit');
  if(!btn)return;
  btn.style.display=isAdmin?'inline-flex':'none';
  btn.onclick=()=>{
    if(!isAdmin)return;
    quotewrap.innerHTML='<input class="quote-input" id="qinput" maxlength="80" value="'+currentQuote.replace(/"/g,'&quot;')+'" /><button class="qsave" id="qsave">저장</button><span class="qmsg" id="qmsg"></span>';
    const qinput=document.getElementById('qinput');qinput.focus();qinput.select();
    const doSave=async()=>{
      const val=qinput.value.trim();
      if(!val)return;
      document.getElementById('qmsg').textContent='저장 중…';
      try{
        const r=await fetch('/api/quote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pw:adminPw,quote:val})});
        const j=await r.json();
        if(r.ok){currentQuote=j.quote;restoreQuoteUI();}
        else{document.getElementById('qmsg').textContent=(j.error||'저장 실패')+(j.debug?(' / 서버:'+j.debug.envAdminPwMasked+' 받은값:'+j.debug.receivedPwMasked+' ('+j.debug.envSource+')'):'');}
      }catch(e){document.getElementById('qmsg').textContent='저장 실패(네트워크)';}
    };
    document.getElementById('qsave').onclick=doSave;
    qinput.addEventListener('keydown',e=>{if(e.key==='Enter')doSave();if(e.key==='Escape')restoreQuoteUI();});
  };
}
function restoreQuoteUI(){
  quotewrap.innerHTML='<span class="quote" id="quote"></span><button class="qedit" id="qedit" title="문구 수정">✎</button>';
  renderQuote();
  bindQedit();
}
bindQedit();

</script>
